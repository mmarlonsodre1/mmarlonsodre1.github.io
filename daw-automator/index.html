<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAW Automator</title>
  <style>
    body { background: #0a0a0b; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>
<script>
  // Route based on utm_content — default to prosumer
  var p = new URLSearchParams(window.location.search);
  var content = p.get('utm_content') || 'prosumer';
  var dest = content === 'church' ? '/church/' : '/prosumer/';
  // Preserve all query params on redirect
  var qs = window.location.search;
  window.location.replace(dest + qs);
</script>
</body>
</html>
